<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>RM Inventory | ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: white;
        }

        .container {
            padding: 0px;
            background: white;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #64c1bb14;
            padding: 24px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 24px;
        }

        .filters input,
        .filters select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #dcdcdc;
            font-size: 14px;
            width: 100%;
        }

        .kpi-box {
            background: linear-gradient(100deg, #21bbb2, #dcf4f3);
            padding: 16px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
        }

        .kpi-title {
            font-size: 13px;
        }

        .kpi-value {
            font-size: 22px;
            font-weight: 700;
        }

        .layout-padding {
            padding: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f1f3f5;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: #888;
            font-weight: 500;
        }
    </style>
</head>

        <td colspan="3" class="no-data">
        Currently No Records Available
        </td>
        `;

        tableBody.appendChild(tr);
        totalStockElement.innerText = "0.00";
        return;
    }

    filteredData.forEach(row => {

        total += Number(row["Qty Available"]);

        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${row["Item SKU"]}</td>
        <td>${row["Warehouse"]}</td>
        <td>${Number(row["Qty Available"]).toFixed(2)}</td>
        `;

        tableBody.appendChild(tr);

    });

    totalStockElement.innerText =
        total.toLocaleString(undefined,{minimumFractionDigits:2});

}

function applyFilters(){

    const searchValue = searchInput.value.toLowerCase();
    const selectedWarehouse = warehouseSelect.value;

    const filtered = data.filter(row => {

        const matchSearch =
        row["Item SKU"].toLowerCase().includes(searchValue);

        const matchWarehouse =
        selectedWarehouse === "All" ||
        row["Warehouse"] === selectedWarehouse;

        return matchSearch && matchWarehouse;

    });

    renderTable(filtered);

}

searchInput.addEventListener("input",applyFilters);
warehouseSelect.addEventListener("change",applyFilters);

renderTable(data);

</script>


</body>

</html>
